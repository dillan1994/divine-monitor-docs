<svg viewBox="0 0 880 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="pulse-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" rx="20" fill="#131621"/>

  <!-- Header -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="14" letter-spacing="4" fill="#5eead4">SPREAD MODE</text>
  <text x="440" y="70" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="16" fill="#475569">One search term checked per cycle — smooth, even, steady</text>

  <!-- Header divider -->
  <line x1="60" y1="86" x2="820" y2="86" stroke="#1e2840" stroke-width="1"/>

  <!-- Timeline baseline -->
  <line x1="70" y1="230" x2="810" y2="230"
    stroke="#1e2840" stroke-width="2" stroke-linecap="round"/>
  <polygon points="810,225 824,230 810,235" fill="#2d3748"/>
  <text x="830" y="235"
    font-family="'Courier New', Courier, monospace"
    font-size="13" fill="#2d3748">time</text>

  <!-- ─── PULSE 1: Hat @ x=120 ─── -->
  <line x1="120" y1="230" x2="120" y2="163"
    stroke="#5eead4" stroke-width="3" stroke-linecap="round" filter="url(#pulse-glow)"/>
  <circle cx="120" cy="163" r="7" fill="#5eead4" filter="url(#pulse-glow)"/>
  <text x="120" y="149" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="17" font-weight="600" fill="#5eead4">Hat</text>
  <line x1="120" y1="230" x2="120" y2="244" stroke="#5eead4" stroke-width="1.5"/>

  <!-- Delay 1 -->
  <line x1="124" y1="264" x2="256" y2="264" stroke="#1e2840" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="124" y1="258" x2="124" y2="270" stroke="#1e2840" stroke-width="1"/>
  <line x1="256" y1="258" x2="256" y2="270" stroke="#1e2840" stroke-width="1"/>
  <text x="190" y="286" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="13" fill="#334155">~45s</text>

  <!-- ─── PULSE 2: Umbrella @ x=260 ─── -->
  <line x1="260" y1="230" x2="260" y2="163"
    stroke="#5eead4" stroke-width="3" stroke-linecap="round" filter="url(#pulse-glow)"/>
  <circle cx="260" cy="163" r="7" fill="#5eead4" filter="url(#pulse-glow)"/>
  <text x="260" y="149" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="17" font-weight="600" fill="#5eead4">Umbrella</text>
  <line x1="260" y1="230" x2="260" y2="244" stroke="#5eead4" stroke-width="1.5"/>

  <!-- Delay 2 -->
  <line x1="264" y1="264" x2="396" y2="264" stroke="#1e2840" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="264" y1="258" x2="264" y2="270" stroke="#1e2840" stroke-width="1"/>
  <line x1="396" y1="258" x2="396" y2="270" stroke="#1e2840" stroke-width="1"/>
  <text x="330" y="286" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="13" fill="#334155">~45s</text>

  <!-- ─── PULSE 3: Bottle @ x=400 ─── -->
  <line x1="400" y1="230" x2="400" y2="163"
    stroke="#5eead4" stroke-width="3" stroke-linecap="round" filter="url(#pulse-glow)"/>
  <circle cx="400" cy="163" r="7" fill="#5eead4" filter="url(#pulse-glow)"/>
  <text x="400" y="149" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="17" font-weight="600" fill="#5eead4">Bottle</text>
  <line x1="400" y1="230" x2="400" y2="244" stroke="#5eead4" stroke-width="1.5"/>

  <!-- Delay 3 -->
  <line x1="404" y1="264" x2="536" y2="264" stroke="#1e2840" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="404" y1="258" x2="404" y2="270" stroke="#1e2840" stroke-width="1"/>
  <line x1="536" y1="258" x2="536" y2="270" stroke="#1e2840" stroke-width="1"/>
  <text x="470" y="286" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="13" fill="#334155">~45s</text>

  <!-- ─── PULSE 4: Hat @ x=540 ─── -->
  <line x1="540" y1="230" x2="540" y2="163"
    stroke="#5eead4" stroke-width="3" stroke-linecap="round" filter="url(#pulse-glow)"/>
  <circle cx="540" cy="163" r="7" fill="#5eead4" filter="url(#pulse-glow)"/>
  <text x="540" y="149" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="17" font-weight="600" fill="#5eead4">Hat</text>
  <line x1="540" y1="230" x2="540" y2="244" stroke="#5eead4" stroke-width="1.5"/>

  <!-- Delay 4 -->
  <line x1="544" y1="264" x2="676" y2="264" stroke="#1e2840" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="544" y1="258" x2="544" y2="270" stroke="#1e2840" stroke-width="1"/>
  <line x1="676" y1="258" x2="676" y2="270" stroke="#1e2840" stroke-width="1"/>
  <text x="610" y="286" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="13" fill="#334155">~45s</text>

  <!-- ─── PULSE 5: Umbrella @ x=680 ─── -->
  <line x1="680" y1="230" x2="680" y2="163"
    stroke="#5eead4" stroke-width="3" stroke-linecap="round" filter="url(#pulse-glow)"/>
  <circle cx="680" cy="163" r="7" fill="#5eead4" filter="url(#pulse-glow)"/>
  <text x="680" y="149" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="17" font-weight="600" fill="#5eead4">Umbrella</text>
  <line x1="680" y1="230" x2="680" y2="244" stroke="#5eead4" stroke-width="1.5"/>

  <!-- Continuation -->
  <text x="740" y="237"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="28" fill="#2d3748" letter-spacing="3">···</text>

  <!-- ─── SUMMARY ─── -->
  <rect x="60" y="338" width="760" height="118" rx="12"
    fill="rgba(94,234,212,0.04)" stroke="rgba(94,234,212,0.1)" stroke-width="1"/>

  <circle cx="92" cy="366" r="5" fill="#5eead4" opacity="0.7"/>
  <text x="108" y="371"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="15" fill="#94a3b8">1 term checked per cycle</text>

  <circle cx="92" cy="396" r="5" fill="#5eead4" opacity="0.7"/>
  <text x="108" y="401"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="15" fill="#94a3b8">~30–60s random delay between each check</text>

  <circle cx="92" cy="426" r="5" fill="#5eead4" opacity="0.7"/>
  <text x="108" y="431"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="15" fill="#94a3b8">All terms get fair attention over time</text>
</svg>
