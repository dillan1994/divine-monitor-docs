  </g>

  <text x="415" y="260" text-anchor="middle" fill="#B9CFDE" font-family="Arial, sans-serif" font-size="18" font-weight="600">30-60s delay</text>
  <path d="M335 285 L495 285" stroke="#9EB7C7" stroke-width="3" marker-end="url(#arrowBurst)"/>

  <text x="785" y="260" text-anchor="middle" fill="#B9CFDE" font-family="Arial, sans-serif" font-size="18" font-weight="600">30-60s delay</text>
  <path d="M705 285 L865 285" stroke="#9EB7C7" stroke-width="3" marker-end="url(#arrowBurst)"/>

  <rect x="70" y="500" width="1060" height="48" rx="14" fill="#143244" stroke="#2F556C"/>
  <text x="600" y="531" text-anchor="middle" fill="#DFF6F0" font-family="Arial, sans-serif" font-size="22" font-weight="600">Result: multiple terms checked in each round for faster detection</text>
