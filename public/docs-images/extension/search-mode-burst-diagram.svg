    <text x="87.5" y="76" text-anchor="middle" fill="#0E1A2B" font-family="Arial, sans-serif" font-size="23" font-weight="700">Hat</text>
    <rect x="0" y="112" width="175" height="60" rx="12" fill="url(#termBurst)"/>
    <text x="87.5" y="148" text-anchor="middle" fill="#0E1A2B" font-family="Arial, sans-serif" font-size="23" font-weight="700">Umbrella</text>
    <rect x="0" y="184" width="175" height="60" rx="12" fill="url(#termBurst)"/>
    <text x="87.5" y="220" text-anchor="middle" fill="#0E1A2B" font-family="Arial, sans-serif" font-size="23" font-weight="700">Bottle</text>
  </g>

  <g transform="translate(885 175)">
    <text x="0" y="20" fill="#B9CFDE" font-family="Arial, sans-serif" font-size="18" font-weight="600">Round 3</text>
    <rect x="0" y="40" width="175" height="60" rx="12" fill="url(#termBurst)"/>
    <text x="87.5" y="76" text-anchor="middle" fill="#0E1A2B" font-family="Arial, sans-serif" font-size="23" font-weight="700">Hat</text>
    <rect x="0" y="112" width="175" height="60" rx="12" fill="url(#termBurst)"/>
    <text x="87.5" y="148" text-anchor="middle" fill="#0E1A2B" font-family="Arial, sans-serif" font-size="23" font-weight="700">Umbrella</text>
    <rect x="0" y="184" width="175" height="60" rx="12" fill="url(#termBurst)"/>
