<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBurst" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E1A2B"/>
      <stop offset="1" stop-color="#112E35"/>
    </linearGradient>
    <linearGradient id="termBurst" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#74F0D3"/>
      <stop offset="1" stop-color="#3BB89B"/>
    </linearGradient>
    <linearGradient id="delayBurst" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#22384A"/>
      <stop offset="1" stop-color="#1A2A39"/>
    </linearGradient>
    <marker id="arrowBurst" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#9EB7C7"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="630" rx="28" fill="url(#bgBurst)"/>
  <rect x="30" y="30" width="1140" height="570" rx="22" stroke="#3D556B" stroke-opacity="0.6"/>

  <text x="70" y="95" fill="#B9CFDE" font-family="Arial, sans-serif" font-size="24">Multiple search terms checked together, with short random pauses between each term</text>

  <rect x="70" y="130" width="1060" height="2" fill="#2F4A60"/>

  <g transform="translate(145 175)">
