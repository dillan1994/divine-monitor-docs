<svg viewBox="0 0 860 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="pulse-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="480" rx="20" fill="#131621"/>

  <!-- Header -->
  <text x="430" y="44" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="14" letter-spacing="4" fill="#5eead4">BURST MODE</text>
  <text x="430" y="70" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="16" fill="#475569">All search terms checked together per round — then one long gap</text>

  <!-- Header divider -->
  <line x1="60" y1="86" x2="800" y2="86" stroke="#1e2840" stroke-width="1"/>

  <!-- Timeline baseline -->
  <line x1="70" y1="230" x2="790" y2="230"
    stroke="#1e2840" stroke-width="2" stroke-linecap="round"/>
  <polygon points="790,225 804,230 790,235" fill="#2d3748"/>
  <text x="810" y="235"
    font-family="'Courier New', Courier, monospace"
    font-size="13" fill="#2d3748">time</text>

  <!-- ═══ ROUND 1 ═══ -->
  <!-- Cluster bracket -->
  <rect x="94" y="88" width="210" height="152" rx="8"
    fill="rgba(94,234,212,0.03)" stroke="rgba(94,234,212,0.2)" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="199" y="80" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="11" letter-spacing="2" fill="rgba(94,234,212,0.5)">ROUND 1</text>

  <!-- Pulse Hat @ x=130 -->
  <line x1="130" y1="230" x2="130" y2="140"
    stroke="#5eead4" stroke-width="3" stroke-linecap="round" filter="url(#pulse-glow)"/>
  <circle cx="130" cy="140" r="7" fill="#5eead4" filter="url(#pulse-glow)"/>
  <text x="130" y="126" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="17" font-weight="600" fill="#5eead4">Hat</text>
  <line x1="130" y1="230" x2="130" y2="244" stroke="#5eead4" stroke-width="1.5"/>

  <text x="164" y="260"
    font-family="'Courier New', Courier, monospace"
    font-size="11" fill="#2d3748">~2s</text>

  <!-- Pulse Umbrella @ x=198 -->
  <line x1="198" y1="230" x2="198" y2="152"
    stroke="#5eead4" stroke-width="3" stroke-linecap="round" filter="url(#pulse-glow)"/>
  <circle cx="198" cy="152" r="7" fill="#5eead4" filter="url(#pulse-glow)"/>
  <text x="198" y="138" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="17" font-weight="600" fill="#5eead4">Umbrella</text>
  <line x1="198" y1="230" x2="198" y2="244" stroke="#5eead4" stroke-width="1.5"/>

  <text x="234" y="260"
    font-family="'Courier New', Courier, monospace"
    font-size="11" fill="#2d3748">~2s</text>

  <!-- Pulse Bottle @ x=268 -->
  <line x1="268" y1="230" x2="268" y2="164"
    stroke="#5eead4" stroke-width="3" stroke-linecap="round" filter="url(#pulse-glow)"/>
  <circle cx="268" cy="164" r="7" fill="#5eead4" filter="url(#pulse-glow)"/>
  <text x="268" y="150" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="17" font-weight="600" fill="#5eead4">Bottle</text>
  <line x1="268" y1="230" x2="268" y2="244" stroke="#5eead4" stroke-width="1.5"/>

  <!-- ─── LONG DELAY ─── -->
  <line x1="276" y1="264" x2="514" y2="264" stroke="#1e2840" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="276" y1="258" x2="276" y2="270" stroke="#1e2840" stroke-width="1"/>
  <line x1="514" y1="258" x2="514" y2="270" stroke="#1e2840" stroke-width="1"/>
  <text x="395" y="288" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="13" fill="#334155">~30–60s delay</text>

  <!-- ═══ ROUND 2 ═══ -->
  <!-- Cluster bracket -->
  <rect x="524" y="88" width="210" height="152" rx="8"
    fill="rgba(94,234,212,0.03)" stroke="rgba(94,234,212,0.2)" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="629" y="80" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="11" letter-spacing="2" fill="rgba(94,234,212,0.5)">ROUND 2</text>

  <!-- Pulse Hat @ x=560 -->
  <line x1="560" y1="230" x2="560" y2="140"
    stroke="#5eead4" stroke-width="3" stroke-linecap="round" filter="url(#pulse-glow)"/>
  <circle cx="560" cy="140" r="7" fill="#5eead4" filter="url(#pulse-glow)"/>
  <text x="560" y="126" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="17" font-weight="600" fill="#5eead4">Hat</text>
  <line x1="560" y1="230" x2="560" y2="244" stroke="#5eead4" stroke-width="1.5"/>

  <text x="594" y="260"
    font-family="'Courier New', Courier, monospace"
    font-size="11" fill="#2d3748">~2s</text>

  <!-- Pulse Umbrella @ x=628 -->
  <line x1="628" y1="230" x2="628" y2="152"
    stroke="#5eead4" stroke-width="3" stroke-linecap="round" filter="url(#pulse-glow)"/>
  <circle cx="628" cy="152" r="7" fill="#5eead4" filter="url(#pulse-glow)"/>
  <text x="628" y="138" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="17" font-weight="600" fill="#5eead4">Umbrella</text>
  <line x1="628" y1="230" x2="628" y2="244" stroke="#5eead4" stroke-width="1.5"/>

  <text x="664" y="260"
    font-family="'Courier New', Courier, monospace"
    font-size="11" fill="#2d3748">~2s</text>

  <!-- Pulse Bottle @ x=698 -->
  <line x1="698" y1="230" x2="698" y2="164"
    stroke="#5eead4" stroke-width="3" stroke-linecap="round" filter="url(#pulse-glow)"/>
  <circle cx="698" cy="164" r="7" fill="#5eead4" filter="url(#pulse-glow)"/>
  <text x="698" y="150" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="17" font-weight="600" fill="#5eead4">Bottle</text>
  <line x1="698" y1="230" x2="698" y2="244" stroke="#5eead4" stroke-width="1.5"/>

  <!-- Continuation -->
  <text x="746" y="237"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="28" fill="#2d3748" letter-spacing="3">···</text>

  <!-- ─── SUMMARY ─── -->
  <rect x="60" y="338" width="740" height="118" rx="12"
    fill="rgba(94,234,212,0.04)" stroke="rgba(94,234,212,0.1)" stroke-width="1"/>

  <circle cx="92" cy="366" r="5" fill="#5eead4" opacity="0.7"/>
  <text x="108" y="371"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="15" fill="#94a3b8">All terms checked together in each round (~2s between each term)</text>

  <circle cx="92" cy="396" r="5" fill="#5eead4" opacity="0.7"/>
  <text x="108" y="401"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="15" fill="#94a3b8">~30–60s random delay after each full round</text>

  <circle cx="92" cy="426" r="5" fill="#5eead4" opacity="0.7"/>
  <text x="108" y="431"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="15" fill="#94a3b8">Faster detection — each term checked every round</text>
</svg>
